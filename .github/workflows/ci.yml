name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-pack:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            test-framework: net10.0
            coverage: true
          - os: windows-latest
            test-framework: net48
            coverage: false

    runs-on: ${{ matrix.os }}

    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
      SONAR_ORG: ${{ secrets.SONAR_ORG }}

    steps:
      - name: Checkout code repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5.0.5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Cache Sonar packages
        if: ${{ matrix.coverage && github.event_name != 'pull_request' && env.SONAR_TOKEN != '' && env.SONAR_PROJECT_KEY != '' && env.SONAR_ORG != '' }}
        uses: actions/cache@v5.0.5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar

      - name: Restore dependencies
        run: dotnet restore Altcha.Net.sln

      - name: Setup Java
        if: ${{ matrix.coverage && github.event_name != 'pull_request' && env.SONAR_TOKEN != '' && env.SONAR_PROJECT_KEY != '' && env.SONAR_ORG != '' }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install SonarScanner
        if: ${{ matrix.coverage && github.event_name != 'pull_request' && env.SONAR_TOKEN != '' && env.SONAR_PROJECT_KEY != '' && env.SONAR_ORG != '' }}
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Sonar Begin
        if: ${{ matrix.coverage && github.event_name != 'pull_request' && env.SONAR_TOKEN != '' && env.SONAR_PROJECT_KEY != '' && env.SONAR_ORG != '' }}
        run: >
          dotnet sonarscanner begin
          /k:"$env:SONAR_PROJECT_KEY"
          /o:"$env:SONAR_ORG"
          /d:sonar.host.url="https://sonarcloud.io"
          /d:sonar.token="$env:SONAR_TOKEN"
          /d:sonar.cs.opencover.reportsPaths="TestResults/**/coverage.opencover.xml"
          /d:sonar.coverage.exclusions="**/Program.cs,**/*Tests.cs,**/examples/**"
          /d:sonar.exclusions="**/coveragereport/**,**/examples/**"
          /d:sonar.scanner.skipJreProvisioning=true

      - name: Build
        run: dotnet build Altcha.Net.sln --no-restore --configuration Release

      - name: Test core
        if: ${{ !matrix.coverage }}
        run: dotnet test tests/Altcha.Net.Tests/Altcha.Net.Tests.csproj --no-build --configuration Release --framework ${{ matrix.test-framework }}

      - name: Test core with coverage
        if: ${{ matrix.coverage }}
        run: >
          dotnet test tests/Altcha.Net.Tests/Altcha.Net.Tests.csproj
          --no-build
          --configuration Release
          --framework ${{ matrix.test-framework }}
          --results-directory TestResults
          --settings coverlet.runsettings
          --collect:"XPlat Code Coverage"

      - name: Test ASP.NET Core integration
        if: ${{ matrix.coverage }}
        run: >
          dotnet test tests/Altcha.Net.AspNetCore.Tests/Altcha.Net.AspNetCore.Tests.csproj
          --no-build
          --configuration Release
          --framework net10.0
          --results-directory TestResults
          --settings coverlet.runsettings
          --collect:"XPlat Code Coverage"

      - name: Verify coverage files
        if: ${{ matrix.coverage }}
        run: |
          $files = Get-ChildItem -Path TestResults -Recurse -Filter coverage.opencover.xml
          $files | ForEach-Object { $_.FullName }
          if ($files.Count -eq 0) {
            throw "No coverage.opencover.xml files found under TestResults."
          }

      - name: Sonar End
        if: ${{ matrix.coverage && github.event_name != 'pull_request' && env.SONAR_TOKEN != '' && env.SONAR_PROJECT_KEY != '' && env.SONAR_ORG != '' }}
        run: dotnet sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"

      - name: Install ReportGenerator tool
        if: ${{ matrix.coverage }}
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        if: ${{ matrix.coverage }}
        run: >
          reportgenerator
          -reports:"TestResults/**/coverage.opencover.xml"
          -targetdir:"coveragereport"
          -reporttypes:"TextSummary;Html"

      - name: Print coverage summary
        if: ${{ matrix.coverage }}
        run: Get-Content coveragereport/Summary.txt

      - name: Enforce coverage
        if: ${{ matrix.coverage }}
        run: |
          $summary = Get-Content coveragereport/Summary.txt -Raw
          $match = [regex]::Match($summary, 'Line coverage:\s*([0-9.]+)%')
          $coverage = if ($match.Success) { [double]$match.Groups[1].Value } else { 0 }
          Write-Host "Detected coverage: $coverage%"
          if ($coverage -lt 50) {
            throw "Line coverage is below 50%."
          }

      - name: Pack
        if: ${{ matrix.coverage }}
        run: |
          dotnet pack src/Altcha.Net/Altcha.Net.csproj --no-build --configuration Release --output artifacts/packages
          dotnet pack src/Altcha.Net.AspNetCore/Altcha.Net.AspNetCore.csproj --no-build --configuration Release --output artifacts/packages

      - name: Upload packages artifact
        if: ${{ matrix.coverage }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: nuget-packages
          path: artifacts/packages

      - name: Upload coverage report artifact
        if: ${{ always() && matrix.coverage }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-report
          path: coveragereport
